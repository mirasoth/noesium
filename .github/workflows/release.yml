name: Release Noesium

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

jobs:
  deploy-noesium:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/noesium

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      working-directory: noesium
      run: uv sync --extra dev --extra all

    - name: Run tests
      working-directory: noesium
      run: uv run pytest tests/ -v -m "not integration"

    - name: Build package
      working-directory: noesium
      run: |
        uv build
        ls -la dist/
        if [ ! -f dist/*.whl ] || [ ! -f dist/*.tar.gz ]; then
          echo "❌ Missing build artifacts"
          exit 1
        fi

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: noesium/dist/
        verbose: true
        print-hash: true
