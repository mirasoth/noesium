name: Release Noesium

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

jobs:
  deploy-noesium:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/noesium

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      working-directory: noesium
      run: uv sync --extra dev --extra all

    - name: Run tests
      working-directory: noesium
      run: uv run pytest tests/ -v -m "not integration"

    - name: Build package
      working-directory: noesium
      run: uv build --out-dir dist/

    - name: Verify build artifacts
      working-directory: noesium
      run: |
        ls -la dist/
        WHL_COUNT=$(ls dist/*.whl 2>/dev/null | wc -l)
        TGZ_COUNT=$(ls dist/*.tar.gz 2>/dev/null | wc -l)
        if [ "$WHL_COUNT" -eq 0 ] || [ "$TGZ_COUNT" -eq 0 ]; then
          echo "❌ Missing build artifacts"
          exit 1
        fi
        echo "✅ Build artifacts verified"

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: noesium/dist/
        verbose: true
        print-hash: true
