name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-noesium:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxslt-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install workspace dependencies
      run: uv sync --all-packages --extra dev --extra all

    - name: Run noesium tests
      run: uv run pytest noesium/tests/ -v

    - name: Build noesium package
      run: cd noesium && uv build

  test-noeagent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install workspace dependencies
      run: uv sync --all-packages --extra dev

    - name: Run noeagent tests
      run: uv run pytest noeagent/tests/ -v

    - name: Build noeagent package
      run: cd noeagent && uv build

  test-voyager-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install workspace dependencies
      run: uv sync --all-packages --extra dev

    - name: Run voyager backend tests
      run: uv run pytest voyager/backend/tests/ -v

    - name: Build voyager backend package
      run: cd voyager/backend && uv build

  test-voyager-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: voyager/frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd voyager/frontend && npm ci

    - name: Build frontend
      run: cd voyager/frontend && npm run build

    - name: Run linter
      run: cd voyager/frontend && npm run lint

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-packages --extra dev

    - name: Check formatting
      run: uv run black --check noesium/src noeagent/src voyager/backend/src

    - name: Run linter
      run: uv run ruff check noesium/src noeagent/src voyager/backend/src
